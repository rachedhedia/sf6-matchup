name: SF6Matchup

options:
  bundleIdPrefix: com.sf6matchup
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  SF6Matchup:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: Sources

    settings:
      base:
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.sf6matchup.SF6Matchup
